name: CI

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    # Weekly contract drift sweep — the backend vocabulary can move without any
    # commit landing here; the cron makes that drift surface as a red run.
    - cron: "0 15 * * 1"

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.5"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run check-types

      - name: Contract drift check (vendored src/contract.ts vs prod GET /api/contract)
        run: bun scripts/check-contract-drift.ts

      - name: Smoke-test CLI paths (no env required)
        run: |
          set -euo pipefail
          bun src/cli.ts | grep -q "DriftDebrief agent CLI"
          echo '{"stop_hook_active":false}' | bun src/cli.ts stop-hook | grep -q '"decision":"block"'
          OUT=$(echo '{"stop_hook_active":true}' | bun src/cli.ts stop-hook)
          test -z "$OUT" || { echo "stop-hook continuation must allow the stop (got: $OUT)"; exit 1; }
