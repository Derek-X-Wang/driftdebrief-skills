# DriftDebrief — Codex CLI setup (copy into ~/.codex/config.toml)
#
# Codex shares the same MCP server as Claude Code (emit / retrieve / manage
# debrief cards). Codex does NOT use the Claude Code `Stop` hook, so on Codex the
# EMIT side is driven by the portable instructions in skills/driftdebrief/SKILL.md
# (the agent emits via the MCP tools after meaningful work). SYNC is on demand:
# ask Codex to "sync my DriftDebrief cards" or run the get-open-cards tool.
#
# Uses the published npm package via bunx. From a clone, use `command = "bun"` /
# `args = ["/absolute/path/to/driftdebrief-skills/src/mcp.ts"]` instead.

[mcp_servers.driftdebrief]
command = "bunx"
args = ["@driftdebrief/skills", "mcp"]

[mcp_servers.driftdebrief.env]
DRIFTDEBRIEF_API_URL = "https://<your-deployment>.convex.site"
DRIFTDEBRIEF_TOKEN = "dd_..."
DRIFTDEBRIEF_AGENT = "codex"
